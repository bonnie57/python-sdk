name: Build and Test

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string
      ENVIRONMENT:
        required: true
        type: string
    secrets:
      WALLET_PRIVATE_KEY:
        required: true
      TEST_WALLET_ADDRESS:
        required: true

jobs:
  build_and_test:
    name: Build and Test
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ inputs.ENVIRONMENT }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]
    env:
      WALLET_PRIVATE_KEY: ${{ secrets.WALLET_PRIVATE_KEY }}
      TEST_WALLET_ADDRESS: ${{ secrets.TEST_WALLET_ADDRESS }}

    steps:
      - name: Set Timestamp
        run: |
          echo "TIMESTAMP=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Check out code
        uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5
        with:
          ref: ${{ inputs.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install uv
        uses: astral-sh/setup-uv@v6.0.0
        with:
          version: "0.9.11"
      - name: Install dependencies
        run: uv pip install --system -e . pytest-cov coverage

      - name: Run tests with coverage
        run: |
          coverage run -m pytest tests/integration -v -ra
          coverage xml

      - name: Upload Test Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
        with:
          name: test-report-${{ env.TIMESTAMP }}
          path: coverage.xml
